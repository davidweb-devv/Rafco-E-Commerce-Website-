<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafco | Household Luxury</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
           <div class="logo">
    <span class="brand-name">RAFCO</span>
    <span class="brand-tagline">BEST ESSENTIALS</span>
</div>

            <div class="cart-box">
                <span class="cart-icon">🛒</span>
                <span id="cart-count">0</span>
            </div>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search for electronics, clothes...">
            <button class="search-button">Search</button>
        </div>
        
        <nav class="category-nav">
            <a href="index.html">Home</a>
            <a href="electronics.html">Electronics</a>
            <a href="clothes.html">Clothes</a>
            <a href="household.html" class="active">Household</a>
        </nav>
    </header>

    <section class="hero" style="background: linear-gradient(to bottom, #ffffff, #fff9c4, #fdf497);">
        <h1>Home & <span class="gold-text">Luxury</span></h1>
        <p>Turn your house into a home with our golden selection of essentials.</p>
    </section>

    <main class="products-section">
        <div class="product-grid">
            <div class="product-card" style="border-bottom: 3px solid var(--gold);">
                <div class="badge">Top Rated</div>
                <img src="https://via.placeholder.com/300?text=Cookware+Set" alt="Cookware">
                <div class="card-details">
                    <h3>Premium Gold-Trim Cookware</h3>
                    <p class="price">₦55,000</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
            <div class="product-card" style="border-bottom: 3px solid var(--gold);">
                <img src="https://via.placeholder.com/300?text=Home+Decor" alt="Decor">
                <div class="card-details">
                    <h3>Velvet Interior Pillow Set</h3>
                    <p class="price">₦12,000</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </div>
        
        <section id="cart-summary" class="cart-section">
    <div class="cart-header">
        <h2>Your Selection</h2>
        <button id="clear-cart-btn" class="secondary-btn">Clear All</button>
    </div>
    
    <div id="cart-items-list">
        </div>
    
    <div class="cart-total">
        <strong>Total Items: </strong> <span id="total-items">0</span>
    </div>
     <button id="whatsapp-order-btn" class="primary-btn" style="width: 100%; margin-top: 20px; background-color: #075E54; color: white; border: none; padding: 15px; border-radius: 45px; font-weight: bold; cursor: pointer;">
    Send Order via WhatsApp <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width: 22px; margin-left: 10px; vertical-align: middle;">

</button>

</section>

<div id="custom-toast" class="toast">Added to cart! 🛒</div>

    </main>
  <script src="script.js"></script>

</body>
</html>
